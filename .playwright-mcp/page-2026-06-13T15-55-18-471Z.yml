            - generic [ref=e143]:
              - heading "這是你的解答" [level=2] [ref=e144]
              - paragraph [ref=e145]: 本書即希望對於鐵板燒有興趣的年輕夥伴、餐飲學子，可以好好詳細地認識鐵板師傅的學習過程，而業者與本身從事鐵板相關師傅，在手法與技術上每一位師傅都還是會有些許差異，僅希望能藉由此工具書，讓人員訓練上可以有明確的方向，幫助其理解與縮短訓練期。
              - paragraph [ref=e146]: 本書將詳細的介紹基本鐵板燒的服務禮儀與鐵板手法的技巧，將各種繁複的動作一拆解，以分解動作的方式，讓讀者能清楚明瞭、更好上手，藉此吸引並培養更多的餐飲人才投身鐵板師傅行列。
              - paragraph [ref=e147]: 這本書可以說是一本全面且實用的鐵板廚藝教學工具書。它涵蓋從鐵板基礎工具、設備、相關知識到烹調技巧，無一不包。它不僅介紹了各種鐵板燒廚藝料理手法與過程，還提供了豐富圖片與示例，讓讀者能夠清楚理解和掌握每一個步驟和細節。
