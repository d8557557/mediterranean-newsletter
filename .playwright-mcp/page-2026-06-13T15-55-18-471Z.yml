              - heading "翻一頁，開始你的鐵板燒料理之旅" [level=1] [ref=e111]
              - generic [ref=e112]: 非知不可鐵板燒料理技法
              - paragraph [ref=e113]: 鐵板燒在台灣一直是很受歡迎的一項餐飲選擇類別，但並不像其他料理一樣全台遍地普及，原因是受限於鐵板技術的高門檻，也就是人才的培育。
              - paragraph [ref=e114]: 鐵板燒師傅的訓練有別於一般的廚師，營業期間由於開放廚房的特性，較不容易訓練，學徒通常都是利用非營運時間訓練，也因此導致整體的訓練周期比起一般廚師都還要來得更長。訓練的難度較高、訓練時間也較長，近年逐漸造成人員的斷層；不過也如此，鐵板燒師傅的薪資待遇通常要比一般廚師來得高上許多。
            - generic [ref=e115]:
